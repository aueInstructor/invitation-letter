<title>Свадьба</title>
<meta name="description" id="metaDescription" content="">
<meta property="og:type" content="website">
<meta property="og:title" id="ogTitle" content="">
<meta property="og:description" id="ogDescription" content="">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23FCFAF4'/%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%23D98899' stroke-width='1.4'/%3E%3Ccircle cx='16' cy='16' r='6' fill='none' stroke='%23A49E73' stroke-width='.9'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

<style>
/* каллиграфический шрифт с кириллицей — лежит рядом, в assets/ */
@font-face{
  font-family:'KZ Good Vibes';
  src:url('assets/KZGoodVibes.ttf') format('truetype');
  font-weight:400;font-style:normal;font-display:swap;
}

:root{
  --ink:#7A2B2B;      /* глубокий винный — акценты */
  --paper:#FCFAF4;    /* тёплый крем — фон */
  --brown:#6E553F;    /* тёплый коричневый */
  --gold:#A49E73;     /* олива-золото — основной текст прописными */
  --rose:#D98899;     /* пыльная роза — заголовки, панно */
  --rose-lt:#EDB0BD;  /* роза светлее */
  --rose-pale:#FBE8EC;/* самая светлая роза — дальняя волна */
  --display:'Prata', Georgia, serif;
  --script:'KZ Good Vibes', 'Prata', cursive;

  --edge:max(96px, 23cqw);  /* высота волнистого края панно */

  /* ЦВЕТА КАРТИНОК-ТРАФАРЕТОВ.
     Файлы в assets/ — белые силуэты; цвет им задаётся здесь,
     как тонирование белой иконки в Unity. Меняйте свободно. */
  --tint-orn:     var(--rose);     /* орнаменты на первом экране */
  --tint-heart:   var(--rose);     /* сердечко-разделитель */
  --tint-ring:    var(--rose-lt);  /* большие кольца-орнаменты */
  --tint-mark:    var(--rose);     /* кольцо вокруг даты в календаре */
  --tint-mandala: var(--paper);    /* мандала на розовом панно */

  --phone:390px;      /* ширина «экрана телефона» на компьютере */
  --bezel:8px;        /* толщина корпуса */
  --backdrop:#2E1A1A; /* тёмный фон вокруг телефона */
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scrollbar-gutter:stable;-webkit-text-size-adjust:100%}
body{
  background:var(--paper);
  color:var(--gold);
  font-family:var(--display);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
::selection{background:var(--rose);color:var(--paper)}

/* ═══════════ ТОНИРОВАНИЕ БЕЛЫХ КАРТИНОК ═══════════
   Картинка работает трафаретом (маской), а цвет даёт заливка —
   так один белый файл можно покрасить в любой цвет.
   Каждый элемент задаёт свой --src (файл) и --tint (цвет). */
.tint{
  display:block;
  background-color:var(--tint, var(--rose));
  -webkit-mask:var(--src) center/contain no-repeat;
          mask:var(--src) center/contain no-repeat;
}
img{max-width:100%;display:block}
.wrap{width:min(100% - 2.5rem, 40rem);margin-inline:auto}

/* ═══════════ КОЛОНКА КОНТЕНТА ═══════════
   На телефоне — во всю ширину, на компьютере — колонка шириной
   «экрана телефона». container-type позволяет всей вёрстке
   считать проценты (cqw) от колонки, а не от окна браузера. */
.phone-content{
  container-type:inline-size;
  max-width:var(--phone);
  margin-inline:auto;
  background:var(--paper);
  position:relative;
}
/* на телефоне колонка занимает всю ширину, без полей по краям */
@media (max-width:500px){
  .phone-content{max-width:none}
}

/* ═══════════ РАМКА ТЕЛЕФОНА (только на компьютере) ═══════════ */
.phone-shell{
  display:none;
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:calc(var(--phone) + var(--bezel) * 2);
  height:100vh;
  border:var(--bezel) solid #1c1c1c;
  border-radius:48px;
  pointer-events:none;z-index:200;
  /* огромная тень заливает всё вокруг телефона тёмным фоном */
  box-shadow:
    0 0 0 100vw var(--backdrop),
    inset 0 0 0 1px rgba(255,255,255,.10);
}
/* «чёлка» */
.phone-shell::before{
  content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);
  width:110px;height:26px;background:#1c1c1c;border-radius:13px;
}
/* полоска-индикатор снизу */
.phone-shell::after{
  content:'';position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  width:100px;height:5px;background:rgba(255,255,255,.22);border-radius:3px;
}

/* включение рамки — в конце файла, после всех остальных правил */

/* ─── типографика: прописные засечкой и каллиграфия ─── */
.caps{
  text-transform:uppercase;letter-spacing:.055em;
  font-size:clamp(.95rem,4.2cqw,1.25rem);line-height:1.55;
  color:var(--gold);text-align:center;text-wrap:balance;
}
.caps.sm{font-size:clamp(.78rem,3.3cqw,.95rem);letter-spacing:.07em}
.script{
  font-family:var(--script);color:var(--rose);
  font-size:clamp(2.4rem,11cqw,3.6rem);line-height:1.15;
  text-align:center;font-weight:400;
}
.script.lg{font-size:clamp(3rem,14cqw,4.6rem)}
.on-rose,.on-rose .caps{color:var(--paper)}
.on-rose .script,.on-rose .unit b,.on-rose .unit span,.on-rose .colon{color:var(--paper)}

/* ═══════════ АНИМАЦИИ ═══════════ */
[data-anim]{opacity:0;transition:opacity 1.1s ease, transform 1.1s cubic-bezier(.2,.7,.3,1)}
[data-anim="up"]      {transform:translateY(64px)}
[data-anim="down"]    {transform:translateY(-44px)}
[data-anim="left"]    {transform:translateX(-90px)}
[data-anim="right"]   {transform:translateX(90px)}
[data-anim="zoom"]    {transform:scale(.9)}
[data-anim="zoom-out"]{transform:scale(.2)}
.anim-in{opacity:1;transform:none}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
@keyframes drip{0%,100%{transform:scaleY(.35);opacity:.4}50%{transform:scaleY(1);opacity:1}}
.spin{animation:spin 26s linear infinite}
.spin-fast{animation:spin 15s linear infinite}
.pulse{animation:pulse 2.4s ease-in-out infinite}

@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important}
  [data-anim]{opacity:1;transform:none}
}

/* ═══════════ КНОПКА СМЕНЫ ЯЗЫКА ═══════════ */
#lang{
  position:fixed;top:1rem;right:1rem;z-index:50;
  min-width:3.6rem;padding:.55rem .9rem;
  border:1px solid var(--rose);border-radius:999px;
  background:var(--paper);color:var(--rose);cursor:pointer;
  font-family:var(--display);font-size:.72rem;
  letter-spacing:.14em;text-transform:uppercase;line-height:1;
  transition:background .3s ease,color .3s ease;
}
#lang:hover,#lang:focus-visible{background:var(--rose);color:var(--paper)}

/* ═══════════ КНОПКА МУЗЫКИ ═══════════ */
#music{
  position:fixed;top:1rem;left:1rem;z-index:50;
  width:clamp(74px,19vw,96px);aspect-ratio:1;
  border:0;padding:0;border-radius:50%;
  background:var(--rose);cursor:pointer;
  display:grid;place-items:center;
}
#music[hidden]{display:none}
#music .ring{position:absolute;inset:0;width:100%;height:100%}
#music .ring text{
  font-family:var(--display);font-size:5.9px;letter-spacing:.95px;
  text-transform:uppercase;fill:var(--paper);
}
#music .ico{width:42%;height:auto}

/* ═══════════ ГЕРОЙ ═══════════ */
.hero{
  position:relative;min-height:100svh;overflow:hidden;
  display:flex;flex-direction:column;justify-content:center;
  /* верхний отступ освобождает место под орнамент в правом углу */
  padding:clamp(16rem,66cqw,22rem) 0 clamp(9rem,36cqw,13rem);
}
.hero .orn{position:absolute;width:clamp(150px,42cqw,260px);aspect-ratio:240/359;
  --tint:var(--tint-orn);z-index:0}
.hero .orn-tr{top:0;right:-8%}
.hero .orn-ml{bottom:6%;left:-14%}
.hero .inner{position:relative;z-index:1;width:min(100% - 2.5rem,40rem);margin-inline:auto}

.logo{text-align:center;margin-bottom:clamp(3rem,14cqw,5rem)}
.logo b{
  display:block;font-family:var(--display);font-weight:400;color:var(--rose);
  font-size:clamp(2.5rem,13cqw,4.4rem);line-height:1;letter-spacing:.14em;
  text-indent:.14em;
}
.logo i{
  display:block;font-family:var(--script);font-style:normal;color:var(--gold);
  font-size:clamp(3.4rem,19cqw,6.4rem);line-height:.85;margin-top:-.34em;
}

.hero-date{
  text-align:right;font-size:clamp(1.35rem,7cqw,2.2rem);
  line-height:1.35;color:var(--gold);letter-spacing:.02em;
}
.hero-dot{
  display:block;width:9px;height:9px;border-radius:50%;background:var(--rose);
  margin:clamp(2.4rem,9cqw,3.6rem) auto 0;
}
.scroll-hint{
  text-align:center;margin-top:clamp(1.6rem,6cqw,2.4rem);
  font-size:.72rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);
}
.scroll-hint::after{
  content:'';display:block;width:1px;height:2rem;margin:.8rem auto 0;
  background:linear-gradient(var(--rose),transparent);
  animation:drip 2.6s ease-in-out infinite;transform-origin:top;
}

/* ═══════════ ОБЩИЕ СЕКЦИИ ═══════════ */
/* overflow:hidden — чтобы кольца-орнаменты, выходящие за край,
   не растягивали страницу вбок */
section.block{position:relative;overflow:hidden;padding:clamp(3rem,10cqw,4.5rem) 0}
section.block > .wrap{position:relative;z-index:1}
.stack > * + *{margin-top:clamp(1.4rem,5cqw,2rem)}

/* большие бледные кольца-орнаменты, выходящие за край */
.ghost-ring{
  position:absolute;width:clamp(190px,56cqw,360px);aspect-ratio:1;
  --src:url('assets/circle-frame.webp');--tint:var(--tint-ring);
  opacity:.3;z-index:0;pointer-events:none;
}
.ghost-ring.l{left:-36%}
.ghost-ring.r{right:-36%}

/* лента-бордюр во всю ширину */
.strip{
  width:100%;height:clamp(26px,7cqw,46px);
  object-fit:cover;object-position:center;
}

/* сердечко-разделитель */
.heart-sep{
  width:clamp(52px,14cqw,74px);aspect-ratio:360/315;
  --src:url('assets/heart.png');--tint:var(--tint-heart);
  margin:clamp(1.6rem,6cqw,2.4rem) auto 0;
}


/* ═══════════ КАЛЕНДАРЬ ═══════════ */
.cal{max-width:26rem;margin:0 auto}
.cal-title{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:0 .4rem;margin-bottom:.9rem;
  font-size:clamp(1.6rem,7cqw,2.2rem);color:var(--gold);
  text-transform:uppercase;letter-spacing:.04em;
}
.cal-week{
  display:grid;grid-template-columns:repeat(7,1fr);
  border:1px solid var(--rose-lt);border-radius:999px;
  padding:.45rem 0;margin-bottom:.5rem;text-align:center;
}
.cal-week span{font-size:clamp(.62rem,2.8cqw,.78rem);letter-spacing:.08em;color:var(--gold)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center}
.cal-grid i{
  font-style:normal;color:var(--gold);
  font-size:clamp(1.05rem,4.6cqw,1.4rem);
  aspect-ratio:1;display:grid;place-items:center;position:relative;z-index:0;
}
.cal-grid i.mark{color:var(--rose)}
.cal-grid i.mark::before{
  content:'';position:absolute;inset:-16%;
  background-color:var(--tint-mark);
  -webkit-mask:url('assets/glitter-ring.webp') center/contain no-repeat;
          mask:url('assets/glitter-ring.webp') center/contain no-repeat;
  z-index:-1;animation:pulse 2.4s ease-in-out infinite;
}

/* ═══════════ РОЗОВОЕ ПАННО ═══════════
   Волнистый верх и «подтёки» снизу — не картинки, а SVG,
   который рисуется кодом по настройкам CONFIG.decor.
   Цвет берётся отсюда, из переменных --rose / --rose-pale. */
.panel{
  position:relative;
  margin-block:var(--edge);
  padding:clamp(2rem,7cqw,3rem) 0 clamp(2.5rem,9cqw,3.5rem);
  background:var(--rose);
  text-align:center;
  /* clip только по горизонтали: кольца-орнаменты не растягивают
     страницу вбок, но волнистые края сверху и снизу остаются видны */
  overflow-x:clip;
}
.panel-edge{
  position:absolute;left:0;width:100%;height:var(--edge);
  display:block;pointer-events:none;fill:var(--rose);
}
.panel-edge--top{top:0;transform:translateY(-99.5%)}
/* нижний край — та же волна, отражённая по вертикали */
.panel-edge--bottom{bottom:0;transform:translateY(99.5%) scaleY(-1)}

/* ═══════════ КНОПКИ-ТАБЛЕТКИ ═══════════ */
.pill{
  display:block;width:min(100%,20rem);margin:clamp(1.8rem,6cqw,2.4rem) auto 0;
  padding:1.05rem 2rem;border:0;border-radius:999px;cursor:pointer;
  font-family:var(--display);font-size:clamp(.95rem,4cqw,1.15rem);
  text-transform:uppercase;letter-spacing:.09em;text-align:center;
  text-decoration:none;transition:transform .3s ease,opacity .3s ease;
}
.pill:hover,.pill:focus-visible{transform:translateY(-2px);opacity:.92}
.pill--light{background:var(--paper);color:var(--rose)}
.pill--rose{background:var(--rose);color:var(--paper);font-family:var(--script);
  font-size:clamp(1.5rem,7cqw,2rem);letter-spacing:0;text-transform:none;padding:.5rem 2rem}

/* ═══════════ АНКЕТА ═══════════ */
.rsvp{max-width:26rem;margin:clamp(2rem,7cqw,2.8rem) auto 0}
.rsvp input[type=text]{
  width:100%;border:1px solid var(--rose-lt);border-radius:999px;
  background:transparent;padding:1rem 1.6rem;
  font-family:var(--script);font-size:clamp(1.4rem,6cqw,1.8rem);color:var(--rose);
}
.rsvp input[type=text]::placeholder{color:var(--rose-lt)}
.rsvp input[type=text]:focus{outline:0;border-color:var(--rose)}
.rsvp-hint{
  margin:clamp(1.2rem,5cqw,1.6rem) 0 .9rem;
  text-transform:uppercase;letter-spacing:.05em;color:var(--rose);
  font-size:clamp(.74rem,3.2cqw,.88rem);line-height:1.35;
}
.choice{
  display:flex;align-items:center;gap:1rem;cursor:pointer;
  padding:.45rem 0;position:relative;
}
.choice input{position:absolute;opacity:0;width:0;height:0}
.choice .dot{
  flex:0 0 auto;width:clamp(28px,7.5cqw,34px);aspect-ratio:1;
  border:1px solid var(--rose);border-radius:50%;display:grid;place-items:center;
}
.choice .dot::after{
  content:'';width:52%;aspect-ratio:1;border-radius:50%;background:var(--rose);
  transform:scale(0);transition:transform .28s cubic-bezier(.34,1.56,.64,1);
}
.choice input:checked ~ .dot::after{transform:scale(1)}
.choice .txt{
  text-transform:uppercase;letter-spacing:.05em;color:var(--rose);
  font-size:clamp(.86rem,3.7cqw,1rem);
}
.choice input:focus-visible ~ .dot{outline:2px solid var(--rose);outline-offset:3px}
.form-note{text-align:center;margin-top:1rem;min-height:1.3rem;
  font-size:.85rem;letter-spacing:.04em;color:var(--rose)}
.thanks{
  font-family:var(--script);color:var(--rose);text-align:center;
  font-size:clamp(1.9rem,9cqw,2.8rem);line-height:1.2;padding:2.5rem 0;
}
/* мелкая подпись под анкетой — просьба ответить до срока */
.deadline-note{
  max-width:26rem;margin:clamp(1.4rem,5cqw,2rem) auto 0;
  text-align:center;color:var(--gold);
  font-size:clamp(.72rem,3cqw,.85rem);line-height:1.5;letter-spacing:.03em;
}

/* ═══════════ ПАННО С ВОЛНАМИ И МАНДАЛОЙ ═══════════ */
.panno{
  position:relative;margin-block:var(--edge);
  padding:clamp(3.5rem,13cqw,6rem) 0 clamp(2.5rem,9cqw,4rem);
  background:var(--rose);
  text-align:center;
}
.panno .wave{
  position:absolute;left:0;width:100%;height:var(--edge);
  display:block;pointer-events:none;
}
.panno .wave-pale{top:0;transform:translateY(-118%);fill:var(--rose-pale)}
.panno .wave-rose{top:0;transform:translateY(-99.5%);fill:var(--rose)}
.panno .mandala{
  position:absolute;top:0;left:8%;
  width:clamp(120px,34cqw,220px);aspect-ratio:1;
  --src:url('assets/mandala.webp');--tint:var(--tint-mandala);
  transform:translateY(-96%);pointer-events:none;
}
.countdown{
  display:flex;justify-content:center;align-items:flex-start;
  gap:clamp(.3rem,2.4cqw,1rem);margin-top:clamp(1rem,4cqw,1.5rem);
}
.unit{position:relative}
.unit b{
  display:block;font-family:var(--script);font-weight:400;color:var(--rose);
  font-size:clamp(2.6rem,13cqw,4rem);line-height:1;font-variant-numeric:tabular-nums;
}
.unit span{
  display:block;font-family:var(--script);color:var(--rose);
  font-size:clamp(1.1rem,5cqw,1.5rem);line-height:1;margin-top:.1em;opacity:.95;
}
.colon{
  font-family:var(--script);color:var(--rose);
  font-size:clamp(2.2rem,10cqw,3.2rem);line-height:1.1;
}

/* ═══════════ ВОЛНИСТЫЙ ФУТЕР ═══════════ */
.foot{
  position:relative;
  margin-top:var(--edge);
  padding:clamp(1.5rem,6cqw,2.5rem) 0 clamp(5rem,20cqw,9rem);
  background:var(--rose);
  text-align:center;
}

a:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid currentColor;outline-offset:4px}

/* ═══════════ КОМПЬЮТЕР: показываем рамку телефона ═══════════ */
@media (min-width:501px){
  body{background:var(--backdrop)}
  .phone-shell{display:block}
  /* кнопки прижимаются к краям «экрана» телефона,
     с отступом от скруглённых углов корпуса */
  #music{top:1.9rem;left:calc(50% - var(--phone) / 2 + 1.3rem)}
  #lang {top:1.9rem;right:calc(50% - var(--phone) / 2 + 1.3rem)}
}

@media print{
  #music,.scroll-hint,.ghost-ring{display:none}
  .hero{min-height:auto;padding:2rem 0}
  .panel,.panno,.foot{background:#fff;margin:1.5rem 0}
  .panel-edge,.panno .wave,.panno .mandala{display:none}
  .on-rose,.on-rose .caps,.on-rose .script,.unit b,.unit span,.colon{color:#000}
  [data-anim]{opacity:1;transform:none}
}
</style>
</head>
<body>

<!-- ═══ КНОПКА СМЕНЫ ЯЗЫКА ═══ -->
<button id="lang" type="button"></button>

<!-- ═══ КНОПКА МУЗЫКИ ═══ -->
<button id="music" type="button" aria-label="Включить музыку" hidden>
  <svg class="ring spin-fast" viewBox="0 0 100 100" aria-hidden="true">
    <defs><path id="musicPath" d="M50,50 m-39,0 a39,39 0 1,1 78,0 a39,39 0 1,1 -78,0"/></defs>
    <text><textPath href="#musicPath" startOffset="0%" id="musicRingText"></textPath></text>
  </svg>

<!-- скрытый приёмник ответа Google Формы (запасной путь отправки) -->
<iframe name="gformSink" id="gformSink" style="display:none" title="" aria-hidden="true"></iframe>

<script src="config.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════
   1. ФОРМА РОЗОВЫХ ПАННО — волнистые края рисуются кодом
   Путь живёт в системе координат 100×100 и растягивается под
   размер блока (preserveAspectRatio="none").
   ═══════════════════════════════════════════════════════════════ */
(function drawPanels(){
  const D = CONFIG.decor || {};
  const clamp01 = v => Math.max(0, Math.min(1, v));

  /* Детерминированный «шум»: одно и то же зерно всегда даёт одну и ту же
     волну, поэтому рисунок не прыгает при перерисовке страницы. */
  function prng(seed){
    let s = seed >>> 0;
    return () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
  }

  /* Волна из кубических Безье. Горизонтальные касательные на стыках
     дают гладкие переходы, а jitter гуляет высотой и шириной каждого
     горба, чтобы линия не выглядела штампованной синусоидой.
     Путь начинается левее нуля и кончается правее сотни — лишнее
     обрезает сам SVG, зато по краям нет обрубленных горбов. */
  function wavePath(humps, amp, shift, jitter, seed){
    const A = clamp01(amp) * 42;
    const J = clamp01(jitter);
    const mid = 50;
    const half = 100 / (Math.max(0.5, humps) * 2);
    const rnd = prng(seed);

    let x = -half * (1 + (shift || 0) % 2);
    let y = mid + A;
    let up = 1;
    const startX = x;
    let d = `M ${x.toFixed(2)} ${y.toFixed(2)}`;

    while (x < 100 + half){
      const w  = half * (1 + (rnd() * 2 - 1) * J * 0.45);   // ширина горба
      const a  = A * (1 - rnd() * J * 0.55);                // высота горба
      const x1 = x + w;
      const y1 = mid - a * up;
      d += ` C ${(x + w / 2).toFixed(2)} ${y.toFixed(2)},` +
           ` ${(x1 - w / 2).toFixed(2)} ${y1.toFixed(2)},` +
           ` ${x1.toFixed(2)} ${y1.toFixed(2)}`;
      x = x1; y = y1; up = -up;
    }
    return `${d} L ${x.toFixed(2)} 100 L ${startX.toFixed(2)} 100 Z`;
  }

  const humps  = D.waveHumps ?? 1.5;
  const amp    = D.waveAmplitude ?? 0.55;
  const jitter = D.waveJitter ?? 0.4;
  const shift  = D.waveShift ?? 0.65;

  // у каждого края своё зерно — иначе все панели выглядели бы одинаково
  document.querySelectorAll('.panel-edge, .wave').forEach((svg, i) => {
    const isBottom = svg.classList.contains('panel-edge--bottom');
    svg.querySelector('path').setAttribute('d',
      wavePath(humps, amp, isBottom ? shift : 0, jitter, 1000 + i * 7919));
  });
})();


/* ═══════════════════════════════════════════════════════════════
   2. ЯЗЫК: все тексты берутся из CONFIG.langs
   ═══════════════════════════════════════════════════════════════ */
const LANG_KEYS = Object.keys(CONFIG.langs);
const LANG_STORE = 'bizod-lang';

function pickLang(){
  const saved = localStorage.getItem(LANG_STORE);
  if (saved && CONFIG.langs[saved]) return saved;
  return CONFIG.langs[CONFIG.defaultLang] ? CONFIG.defaultLang : LANG_KEYS[0];
}

let lang = pickLang();
let L = CONFIG.langs[lang];

const $  = id => document.getElementById(id);
const set  = (id, v) => { const el = $(id); if (el) el.textContent = v; };
const attr = (id, a, v) => { const el = $(id); if (el) el.setAttribute(a, v); };

function applyLang(){
  L = CONFIG.langs[lang];
  const { couple, logo, date, calendar, mapLink } = CONFIG;
  const names = `${couple.one} & ${couple.two}`;

  document.documentElement.lang = L.htmlLang || lang;

  // заголовок вкладки и превью-теги
  const fill = tpl => (tpl || '')
    .replace('{one}', couple.one).replace('{two}', couple.two)
    .replace('{date}', L.meta.date).replace('{city}', L.city);
  document.title = fill(L.meta.title);
  attr('metaDescription', 'content', fill(L.meta.description));
  attr('ogTitle', 'content', fill(L.meta.title));
  attr('ogDescription', 'content', fill(L.meta.description));

  // герой
  set('logoTitle', logo.title);
  set('logoSubtitle', logo.subtitle);

  // приглашение
  set('salutation', L.invite.salutation);
  set('inviteBefore', L.invite.before);
  set('coupleName', names);
  set('inviteAfter', L.invite.after);

  // хозяева
  set('hHosts', L.headings.hosts);
  set('hosts', L.hosts);

  // дата торжества
  set('hCeremony', L.headings.ceremony);
  set('ceremony', L.ceremony);

  // календарь
  $('calWeek').innerHTML = L.weekdays.map(d => `<span>${d}</span>`).join('');
  set('calMonth', L.calendarMonth);
  set('calYear', calendar.year);

  const first  = new Date(calendar.year, calendar.month - 1, 1);
  const lead   = (first.getDay() + 6) % 7;                    // сдвиг до понедельника
  const days   = new Date(calendar.year, calendar.month, 0).getDate();
  const target = new Date(date.iso);
  const markDay = (target.getFullYear() === calendar.year &&
                   target.getMonth() === calendar.month - 1) ? target.getDate() : -1;

  let cells = '<i></i>'.repeat(lead);
  for (let d = 1; d <= days; d++) cells += `<i class="${d === markDay ? 'mark' : ''}">${d}</i>`;
  $('calGrid').innerHTML = cells;

  // отсчёт
  set('hCountdown', L.headings.countdown);
  document.querySelectorAll('#countdown [data-unit]').forEach(el => {
    el.textContent = L.countdownUnits[+el.dataset.unit] || '';
  });

  // адрес
  set('hAddress', L.headings.address);
  $('venueAddress').innerHTML = L.venue.address.join('<br>');
  set('venueName', `"${L.venue.name}"`);
  set('venueKind', L.venue.kind);
  set('mapLink', L.venue.mapButton);
  attr('mapLink', 'href', mapLink);

  // анкета
  set('hRsvp', L.headings.rsvp);
  set('rsvpPrompt', L.rsvp.prompt);
  set('rsvpHint', L.rsvp.hint);
  set('rsvpSubmit', L.rsvp.submit);
  attr('guestName', 'placeholder', L.rsvp.namePlaceholder);
  set('rsvpDeadline', (L.rsvp.deadlineNote || '').replace('{date}', L.rsvp.deadline));

  // варианты ответа: подпись на языке гостя, значение — общее для таблицы
  const picked = document.querySelector('input[name=answer]:checked');
  const pickedIndex = picked ? +picked.dataset.index : -1;
  $('rsvpOptions').innerHTML = L.rsvp.options.map((label, i) => `
    <label class="choice">
      <input type="radio" name="answer" data-index="${i}"
             value="${(CONFIG.answerValues[i] || label).replace(/"/g, '&quot;')}"
             ${i === pickedIndex ? 'checked' : ''}${i === 0 ? ' required' : ''}>
      <span class="dot"></span><span class="txt">${label}</span>
    </label>`).join('');

  // кнопка музыки
  set('musicRingText', (L.music.ring || '').repeat(2));
  const track = $('track');
  attr('music', 'aria-label', track && !track.paused ? L.music.pause : L.music.play);

  // кнопка смены языка показывает язык, на который переключит
  const next = LANG_KEYS[(LANG_KEYS.indexOf(lang) + 1) % LANG_KEYS.length];
  set('lang', CONFIG.langs[next].switchLabel);
  attr('lang', 'aria-label', CONFIG.langs[next].switchLabel);
}

applyLang();

$('lang').addEventListener('click', () => {
  lang = LANG_KEYS[(LANG_KEYS.indexOf(lang) + 1) % LANG_KEYS.length];
  localStorage.setItem(LANG_STORE, lang);
  applyLang();
  tick();                       // подписи под цифрами отсчёта
  animated.forEach(el => el.classList.add('anim-in'));  // ничего не должно исчезнуть
});


/* ═══════════════════════════════════════════════════════════════
   3. ФОНОВАЯ МУЗЫКА — кнопка появляется, только если файл задан
   ═══════════════════════════════════════════════════════════════ */
if (CONFIG.music){
  const btn = $('music'), icon = $('musicIcon'), track = $('track');
  track.src = CONFIG.music;
  btn.hidden = false;
  btn.addEventListener('click', () => {
    if (track.paused){
      track.play();
      icon.src = 'assets/sound-off.svg';
      btn.setAttribute('aria-label', L.music.pause);
    } else {
      track.pause();
      icon.src = 'assets/sound-on.svg';
      btn.setAttribute('aria-label', L.music.play);
    }
  });
}


/* ═══════════════════════════════════════════════════════════════
   4. ПОЯВЛЕНИЕ ЭЛЕМЕНТОВ ПРИ ПРОКРУТКЕ
   ═══════════════════════════════════════════════════════════════ */
const animated = new Set(document.querySelectorAll('[data-anim]'));
const reveal = el => { el.classList.add('anim-in'); animated.delete(el); };

const io = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) reveal(e.target); });
}, { threshold: .12, rootMargin: '0px 0px -6% 0px' });
animated.forEach(el => io.observe(el));

/* подстраховка: то же самое по прокрутке — на случай, если
   IntersectionObserver недоступен или ведёт себя иначе */
function checkVisible(){
  const h = window.innerHeight;
  animated.forEach(el => {
    const r = el.getBoundingClientRect();
    if (r.top < h * 0.94 && r.bottom > 0) reveal(el);
  });
  if (!animated.size){
    window.removeEventListener('scroll', checkVisible);
    window.removeEventListener('resize', checkVisible);
  }
}
window.addEventListener('scroll', checkVisible, { passive: true });
window.addEventListener('resize', checkVisible, { passive: true });

/* первый экран показываем сразу, не дожидаясь прокрутки */
requestAnimationFrame(() => {
  document.querySelectorAll('.hero [data-anim]').forEach((el, i) => {
    setTimeout(() => reveal(el), 120 + i * 180);
  });
  setTimeout(checkVisible, 1200);
});


/* ═══════════════════════════════════════════════════════════════
   5. ОБРАТНЫЙ ОТСЧЁТ
   ═══════════════════════════════════════════════════════════════ */
const cd = $('countdown');
const targetTs = new Date(CONFIG.date.iso).getTime();
const pad = n => String(n).padStart(2, '0');
let timer;
function tick(){
  const diff = targetTs - Date.now();
  if (diff <= 0){
    cd.innerHTML = `<p class="script" style="font-size:clamp(2rem,9cqw,3rem)">${L.today}</p>`;
    clearInterval(timer);
    return;
  }
  const q = cd.querySelector.bind(cd);
  if (!q('[data-d]')) return;
  q('[data-d]').textContent = pad(Math.floor(diff / 864e5));
  q('[data-h]').textContent = pad(Math.floor(diff % 864e5 / 36e5));
  q('[data-m]').textContent = pad(Math.floor(diff % 36e5 / 6e4));
  q('[data-s]').textContent = pad(Math.floor(diff % 6e4 / 1e3));
}
tick();
timer = setInterval(tick, 1000);


/* ═══════════════════════════════════════════════════════════════
   6. АНКЕТА → GOOGLE ФОРМА
   ═══════════════════════════════════════════════════════════════ */
const G = CONFIG.google;
const GOOGLE_URL = G.formId
  ? `https://docs.google.com/forms/d/e/${G.formId}/formResponse`
  : '';

const form = $('rsvpForm');
const note = $('rsvpNote');
const thanks = $('rsvpThanks');
const submitBtn = $('rsvpSubmit');

function showThanks(index){
  form.hidden = true;
  $('rsvpDeadline').hidden = true;
  thanks.hidden = false;
  // последний вариант — отказ
  thanks.textContent = index === L.rsvp.options.length - 1
    ? L.rsvp.thanksNo
    : L.rsvp.thanksYes;
}

/* запасной путь: обычный POST в скрытый iframe (если fetch заблокирован) */
function submitViaIframe(payload){
  const f = document.createElement('form');
  f.action = GOOGLE_URL;
  f.method = 'POST';
  f.target = 'gformSink';
  f.style.display = 'none';
  for (const [k, v] of Object.entries(payload)){
    const input = document.createElement('input');
    input.type = 'hidden'; input.name = k; input.value = v;
    f.appendChild(input);
  }
  document.body.appendChild(f);
  f.submit();
  f.remove();
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = $('guestName').value.trim();
  const answer = form.querySelector('input[name=answer]:checked');

  if (!name){ note.textContent = L.rsvp.errName; return; }
  if (!answer){ note.textContent = L.rsvp.errAnswer; return; }
  note.textContent = '';

  const index = +answer.dataset.index;

  // Google Форма не настроена — тестовый режим
  if (!GOOGLE_URL || !G.nameEntry || !G.answerEntry){
    console.log('RSVP (Google Форма не подключена):', { name, answer: answer.value });
    showThanks(index);
    return;
  }

  const payload = { [G.nameEntry]: name, [G.answerEntry]: answer.value };
  const label = submitBtn.textContent;
  submitBtn.textContent = L.rsvp.sending;
  try {
    // Google не отдаёт CORS-заголовки, поэтому ответ непрозрачный:
    // отсутствие ошибки означает, что запрос ушёл.
    await fetch(GOOGLE_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(payload).toString()
    });
    showThanks(index);
  } catch (err) {
    try {
      submitViaIframe(payload);
      showThanks(index);
    } catch (err2) {
      submitBtn.textContent = label;
      note.textContent = L.rsvp.errSend;
    }
  }
});
</script>
