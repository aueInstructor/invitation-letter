<script>
/* ═══════════════════════════════════════════════════════════════
   1. ФОРМА РОЗОВЫХ ПАННО — волнистые края рисуются кодом
   Путь живёт в системе координат 100×100 и растягивается под
   размер блока (preserveAspectRatio="none").
   ═══════════════════════════════════════════════════════════════ */
(function drawPanels(){
  const D = CONFIG.decor || {};
  const clamp01 = v => Math.max(0, Math.min(1, v));

  /* Детерминированный «шум»: одно и то же зерно всегда даёт одну и ту же
     волну, поэтому рисунок не прыгает при перерисовке страницы. */
  function prng(seed){
    let s = seed >>> 0;
    return () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
  }

  /* Волна из кубических Безье. Горизонтальные касательные на стыках
     дают гладкие переходы, а jitter гуляет высотой и шириной каждого
     горба, чтобы линия не выглядела штампованной синусоидой.
     Путь начинается левее нуля и кончается правее сотни — лишнее
     обрезает сам SVG, зато по краям нет обрубленных горбов. */
  function wavePath(humps, amp, shift, jitter, seed){
    const A = clamp01(amp) * 42;
    const J = clamp01(jitter);
    const mid = 50;
    const half = 100 / (Math.max(0.5, humps) * 2);
    const rnd = prng(seed);

    let x = -half * (1 + (shift || 0) % 2);
    let y = mid + A;
    let up = 1;
    const startX = x;
    let d = `M ${x.toFixed(2)} ${y.toFixed(2)}`;

    while (x < 100 + half){
      const w  = half * (1 + (rnd() * 2 - 1) * J * 0.45);   // ширина горба
      const a  = A * (1 - rnd() * J * 0.55);                // высота горба
      const x1 = x + w;
      const y1 = mid - a * up;
      d += ` C ${(x + w / 2).toFixed(2)} ${y.toFixed(2)},` +
           ` ${(x1 - w / 2).toFixed(2)} ${y1.toFixed(2)},` +
           ` ${x1.toFixed(2)} ${y1.toFixed(2)}`;
      x = x1; y = y1; up = -up;
    }
    return `${d} L ${x.toFixed(2)} 100 L ${startX.toFixed(2)} 100 Z`;
  }

  const humps  = D.waveHumps ?? 1.5;
  const amp    = D.waveAmplitude ?? 0.55;
  const jitter = D.waveJitter ?? 0.4;
  const shift  = D.waveShift ?? 0.65;

  // у каждого края своё зерно — иначе все панели выглядели бы одинаково
  document.querySelectorAll('.panel-edge, .wave').forEach((svg, i) => {
    const isBottom = svg.classList.contains('panel-edge--bottom');
    svg.querySelector('path').setAttribute('d',
      wavePath(humps, amp, isBottom ? shift : 0, jitter, 1000 + i * 7919));
  });
})();


/* ═══════════════════════════════════════════════════════════════
   2. ЯЗЫК: все тексты берутся из CONFIG.langs
   ═══════════════════════════════════════════════════════════════ */
const LANG_KEYS = Object.keys(CONFIG.langs);
const LANG_STORE = 'bizod-lang';

function pickLang(){
  const saved = localStorage.getItem(LANG_STORE);
  if (saved && CONFIG.langs[saved]) return saved;
  return CONFIG.langs[CONFIG.defaultLang] ? CONFIG.defaultLang : LANG_KEYS[0];
}

let lang = pickLang();
let L = CONFIG.langs[lang];

const $  = id => document.getElementById(id);
const set  = (id, v) => { const el = $(id); if (el) el.textContent = v; };
const attr = (id, a, v) => { const el = $(id); if (el) el.setAttribute(a, v); };

function applyLang(){
  L = CONFIG.langs[lang];
  const { couple, logo, date, calendar, mapLink } = CONFIG;
  const names = `${couple.one} & ${couple.two}`;

  document.documentElement.lang = L.htmlLang || lang;

  // заголовок вкладки и превью-теги
  const fill = tpl => (tpl || '')
    .replace('{one}', couple.one).replace('{two}', couple.two)
    .replace('{date}', L.meta.date).replace('{city}', L.city);
  document.title = fill(L.meta.title);
  attr('metaDescription', 'content', fill(L.meta.description));
  attr('ogTitle', 'content', fill(L.meta.title));
  attr('ogDescription', 'content', fill(L.meta.description));

  // герой
  set('logoTitle', logo.title);
  // монограмма в круге: берём из конфига, иначе — первые буквы имён
  // (logo.title остаётся невидимым заголовком страницы)
  const mono = logo.monogram ||
      `${(couple.one || '')[0] || ''} & ${(couple.two || '')[0] || ''}`;
  // части монограммы разносим отдельными элементами: расстояние между
  // ними задаёт --mono-gap в style.css, а не пробелы в тексте
  $('monogram').innerHTML = mono
      .split('&')
      .map(p => `<i>${p.trim()}</i>`)
      .join('<i class="amp">&amp;</i>');

  // приглашение
  set('salutation', L.invite.salutation);
  set('inviteBefore', L.invite.before);
  // имена столбиком: имя / & / имя. Амперсанд мельче — он связка,
  // а не имя, и не должен спорить с ними по весу
  $('coupleName').innerHTML =
    `<span class="nm">${couple.one}</span>` +
    `<span class="amp">&amp;</span>` +
    `<span class="nm">${couple.two}</span>`;
  set('inviteAfter', L.invite.after);

  // хозяева
  set('hHosts', L.headings.hosts);
  set('hosts', L.hosts);

  // дата торжества
  set('hCeremony', L.headings.ceremony);
  set('ceremony', L.ceremony);

  // календарь
  $('calWeek').innerHTML = L.weekdays.map(d => `<span>${d}</span>`).join('');
  set('calMonth', L.calendarMonth);
  set('calYear', calendar.year);

  const first  = new Date(calendar.year, calendar.month - 1, 1);
  const lead   = (first.getDay() + 6) % 7;                    // сдвиг до понедельника
  const days   = new Date(calendar.year, calendar.month, 0).getDate();
  const target = new Date(date.iso);
  const markDay = (target.getFullYear() === calendar.year &&
                   target.getMonth() === calendar.month - 1) ? target.getDate() : -1;

  let cells = '<i></i>'.repeat(lead);
  // число в отдельном span: его чуть приподнимает CSS, чтобы оно
  // стояло по оптическому центру ячейки (см. .cal-grid i span)
  for (let d = 1; d <= days; d++) cells += `<i class="${d === markDay ? 'mark' : ''}"><span>${d}</span></i>`;
  $('calGrid').innerHTML = cells;

  // отсчёт
  set('hCountdown', L.headings.countdown);
  document.querySelectorAll('#countdown [data-unit]').forEach(el => {
    el.textContent = L.countdownUnits[+el.dataset.unit] || '';
  });

  // адрес
  set('hAddress', L.headings.address);
  $('venueAddress').innerHTML = L.venue.address.join('<br>');
  set('venueName', `«${L.venue.name}»`);
  set('venueKind', L.venue.kind);
  set('mapLink', L.venue.mapButton);
  attr('mapLink', 'href', mapLink);

  // анкета
  set('hRsvp', L.headings.rsvp);
  set('rsvpPrompt', L.rsvp.prompt);
  set('rsvpHint', L.rsvp.hint);
  // пустая подсказка не должна занимать место под полем
  $('rsvpHint').hidden = !L.rsvp.hint;
  set('rsvpSubmit', L.rsvp.submit);
  attr('guestName', 'placeholder', L.rsvp.namePlaceholder);
  set('rsvpDeadline', (L.rsvp.deadlineNote || '').replace('{date}', L.rsvp.deadline));

  // варианты ответа: подпись на языке гостя, значение — общее для таблицы
  const picked = document.querySelector('input[name=answer]:checked');
  const pickedIndex = picked ? +picked.dataset.index : -1;
  $('rsvpOptions').innerHTML = L.rsvp.options.map((label, i) => `
    <label class="choice">
      <input type="radio" name="answer" data-index="${i}"
             value="${(CONFIG.answerValues[i] || label).replace(/"/g, '&quot;')}"
             ${i === pickedIndex ? 'checked' : ''}${i === 0 ? ' required' : ''}>
      <span class="dot"></span><span class="txt">${label}</span>
    </label>`).join('');

  // кнопка музыки
  fillRing(L.music.ring || '');
  const mbtn = $('music');
  attr('music', 'aria-label', mbtn && mbtn.dataset.playing ? L.music.pause : L.music.play);

  // кнопка смены языка показывает язык, на который переключит
  const next = LANG_KEYS[(LANG_KEYS.indexOf(lang) + 1) % LANG_KEYS.length];
  set('lang', CONFIG.langs[next].switchLabel);
  attr('lang', 'aria-label', CONFIG.langs[next].switchLabel);

  FIT_ONE_LINE.forEach(fitOneLine);
}

/* строки, которые всегда должны стоять в одну строку */
const FIT_ONE_LINE = ['hosts', 'monogram'];

/* Эти строки должны стоять в одну строку при любой длине.
   Переносить нечему — вместо этого уменьшаем кегль, пока строка не
   влезет в колонку. Шрифт загружается позже разметки, поэтому меряем
   ещё раз, когда он готов, и при смене ширины окна. */
function fitOneLine(id){
  const el = $(id);
  if (!el) return;
  el.style.fontSize = '';                       // вернуть размер из CSS
  const box = el.parentElement, cs = getComputedStyle(box);
  // clientWidth включает поля родителя — вычитаем их, иначе строка
  // упрётся в край (у монограммы это край круга)
  const room = box.clientWidth
             - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
  if (!(room > 0)) return;
  let size = parseFloat(getComputedStyle(el).fontSize);
  const min = size * 0.3;                       // ниже не опускаемся
  while (el.scrollWidth > room && size > min){
    size -= 0.5;
    el.style.fontSize = size + 'px';
  }
}

/* Надпись по кругу кнопки музыки.
   Длина фразы на русском и на казахском разная, поэтому фиксированное
   число повторов оставляло на одном из языков пустую дугу. Считаем,
   сколько копий укладывается в окружность, и растягиваем их ровно
   по ней — textLength раздаёт разницу в пробелы между буквами. */
function fillRing(text){
  const tp = $('musicRingText'), path = $('musicPath');
  if (!tp || !path || !text) return;
  const txt = tp.parentNode;                       // <text>, на нём задан интервал
  txt.style.letterSpacing = '';                    // померить с интервалом из CSS
  tp.textContent = text;
  const circle = path.getTotalLength(), one = tp.getComputedTextLength();
  if (!(one > 0)) { tp.textContent = text.repeat(2); return; }   // шрифт ещё не готов

  tp.textContent = text.repeat(Math.max(1, Math.round(circle / one)));
  // остаток разгоняем по буквам, подбирая интервал: браузер считает
  // длину строки не совсем как сумма букв и промежутков, поэтому
  // доводим за пару шагов, каждый раз перемеряя
  let spacing = parseFloat(getComputedStyle(txt).letterSpacing) || 0;
  for (let i = 0; i < 4; i++){
    const diff = circle - tp.getComputedTextLength();
    if (Math.abs(diff) < .05) break;
    spacing += diff / tp.textContent.length;
    txt.style.letterSpacing = spacing + 'px';
  }
}

applyLang();
if (document.fonts && document.fonts.ready)
  document.fonts.ready.then(() => {
    FIT_ONE_LINE.forEach(fitOneLine);
    fillRing(CONFIG.langs[lang].music.ring || '');
  });
window.addEventListener('resize', () => FIT_ONE_LINE.forEach(fitOneLine), { passive: true });

$('lang').addEventListener('click', () => {
  lang = LANG_KEYS[(LANG_KEYS.indexOf(lang) + 1) % LANG_KEYS.length];
  localStorage.setItem(LANG_STORE, lang);
  applyLang();
  tick();                       // подписи под цифрами отсчёта
  animated.forEach(el => el.classList.add('anim-in'));  // ничего не должно исчезнуть
});


/* ═══════════════════════════════════════════════════════════════
   3. ФОНОВАЯ МУЗЫКА — кнопка появляется, только если файл задан
   ═══════════════════════════════════════════════════════════════ */
// music можно записать строкой ('music.mp3') или объектом с настройками
const MUSIC = typeof CONFIG.music === 'string' ? { file: CONFIG.music }
                                               : (CONFIG.music || {});
if (MUSIC.file){
  const btn = $('music'), icon = $('musicIcon'), track = $('track');
  const START  = MUSIC.start  || 0;                              // с какой секунды играть
  const FADE   = (MUSIC.fade   != null ? MUSIC.fade   : 1.5) * 1000;  // мс
  const VOLUME = MUSIC.volume != null ? MUSIC.volume : 1;

  track.src = MUSIC.file;
  track.volume = 0;
  // зацикливаем сами: штатный loop возвращает на нулевую секунду,
  // а нам нужно обратно на START
  track.loop = false;
  btn.hidden = false;

  /* Плавно выводим громкость на VOLUME. Выключение всегда мгновенное,
     поэтому обратного хода тут нет — только нарастание. */
  let fadeTimer = null;
  function fadeIn(){
    clearInterval(fadeTimer);
    const from = track.volume, step = 1000 / 60;
    const dur = Math.max(FADE * (VOLUME - from) / Math.max(VOLUME, .001), step);
    let passed = 0;
    fadeTimer = setInterval(() => {
      passed += step;
      const k = Math.min(passed / dur, 1);
      track.volume = Math.min(1, Math.max(0, from + (VOLUME - from) * k));
      if (k === 1){ clearInterval(fadeTimer); fadeTimer = null; }
    }, step);
  }
  function stop(){
    clearInterval(fadeTimer); fadeTimer = null;
    track.pause();
    track.volume = 0;          // следующее включение снова начнётся плавно
  }

  /* Перемотка на START. Пока пришли только метаданные, а самих данных
     ещё нет, браузер молча возвращает перемотку в нуль — поэтому
     проверяем результат и, если не вышло, повторяем, когда данные дойдут. */
  function seekToStart(){
    if (!START) return;
    const apply = () => {
      if (track.duration && START < track.duration) track.currentTime = START;
    };
    apply();
    if (Math.abs(track.currentTime - START) > .3)
      track.addEventListener('canplay', apply, { once: true });
  }

  /* Первый запуск идёт со START, повторный после паузы — с того места,
     где остановились. С preload="none" метаданных ещё нет, а без них
     перемотка молча не срабатывает, поэтому ждём их. */
  let started = false;
  function play(){
    const go = () => {
      if (!wantPlay) return;                       // передумали, пока грузилось
      if (!started){ started = true; seekToStart(); }
      track.play().then(fadeIn, () => {});
    };
    if (track.readyState >= 1) go();
    else { track.addEventListener('loadedmetadata', go, { once: true }); track.load(); }
  }

  /* Состояние кнопки держим отдельно от track.paused: файл тяжёлый,
     и пока он грузится, дорожка ещё на паузе — иначе второе нажатие
     снова включало бы музыку вместо того, чтобы отменить первое. */
  let wantPlay = false;
  btn.addEventListener('click', () => {
    wantPlay = !wantPlay;
    btn.dataset.playing = wantPlay ? '1' : '';
    if (wantPlay){
      play();
      icon.src = 'assets/sound-off.svg';
      btn.setAttribute('aria-label', L.music.pause);
    } else {
      stop();                                      // выключение — сразу, без затухания
      icon.src = 'assets/sound-on.svg';
      btn.setAttribute('aria-label', L.music.play);
    }
  });

  /* Дорожка кончилась — возвращаемся на START и снова выводим звук:
     плавный вход прячет склейку. */
  track.addEventListener('ended', () => {
    track.volume = 0;
    seekToStart();
    track.play().then(fadeIn, () => {});
  });
}


/* ═══════════════════════════════════════════════════════════════
   4. ПОЯВЛЕНИЕ ЭЛЕМЕНТОВ ПРИ ПРОКРУТКЕ
   ═══════════════════════════════════════════════════════════════ */
const animated = new Set(document.querySelectorAll('[data-anim]'));
const reveal = el => { el.classList.add('anim-in'); animated.delete(el); };

const io = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) reveal(e.target); });
}, { threshold: .12, rootMargin: '0px 0px -6% 0px' });
animated.forEach(el => io.observe(el));

/* подстраховка: то же самое по прокрутке — на случай, если
   IntersectionObserver недоступен или ведёт себя иначе */
function checkVisible(){
  const h = window.innerHeight;
  animated.forEach(el => {
    const r = el.getBoundingClientRect();
    if (r.top < h * 0.94 && r.bottom > 0) reveal(el);
  });
  if (!animated.size){
    window.removeEventListener('scroll', checkVisible);
    window.removeEventListener('resize', checkVisible);
  }
}
window.addEventListener('scroll', checkVisible, { passive: true });
window.addEventListener('resize', checkVisible, { passive: true });

/* первый экран показываем сразу, не дожидаясь прокрутки */
requestAnimationFrame(() => {
  document.querySelectorAll('.hero [data-anim]').forEach((el, i) => {
    setTimeout(() => reveal(el), 120 + i * 180);
  });
  setTimeout(checkVisible, 1200);
});


/* ═══════════════════════════════════════════════════════════════
   5. ОБРАТНЫЙ ОТСЧЁТ
   ═══════════════════════════════════════════════════════════════ */
const cd = $('countdown');
const targetTs = new Date(CONFIG.date.iso).getTime();
const pad = n => String(n).padStart(2, '0');
let timer;
function tick(){
  const diff = targetTs - Date.now();
  if (diff <= 0){
    cd.innerHTML = `<p class="script" style="font-size:clamp(2rem,9cqw,3rem)">${L.today}</p>`;
    clearInterval(timer);
    return;
  }
  const q = cd.querySelector.bind(cd);
  if (!q('[data-d]')) return;
  q('[data-d]').textContent = pad(Math.floor(diff / 864e5));
  q('[data-h]').textContent = pad(Math.floor(diff % 864e5 / 36e5));
  q('[data-m]').textContent = pad(Math.floor(diff % 36e5 / 6e4));
  q('[data-s]').textContent = pad(Math.floor(diff % 6e4 / 1e3));
}
tick();
timer = setInterval(tick, 1000);


/* ═══════════════════════════════════════════════════════════════
   6. АНКЕТА → GOOGLE ФОРМА
   ═══════════════════════════════════════════════════════════════ */
const G = CONFIG.google;
const GOOGLE_URL = G.formId
  ? `https://docs.google.com/forms/d/e/${G.formId}/formResponse`
  : '';

const form = $('rsvpForm');
const note = $('rsvpNote');
const thanks = $('rsvpThanks');
const submitBtn = $('rsvpSubmit');

function showThanks(index){
  form.hidden = true;
  $('rsvpDeadline').hidden = true;
  thanks.hidden = false;
  // последний вариант — отказ
  thanks.textContent = index === L.rsvp.options.length - 1
    ? L.rsvp.thanksNo
    : L.rsvp.thanksYes;
}

/* запасной путь: обычный POST в скрытый iframe (если fetch заблокирован) */
function submitViaIframe(payload){
  const f = document.createElement('form');
  f.action = GOOGLE_URL;
  f.method = 'POST';
  f.target = 'gformSink';
  f.style.display = 'none';
  for (const [k, v] of Object.entries(payload)){
    const input = document.createElement('input');
    input.type = 'hidden'; input.name = k; input.value = v;
    f.appendChild(input);
  }
  document.body.appendChild(f);
  f.submit();
  f.remove();
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = $('guestName').value.trim();
  const answer = form.querySelector('input[name=answer]:checked');

  if (!name){ note.textContent = L.rsvp.errName; return; }
  if (!answer){ note.textContent = L.rsvp.errAnswer; return; }
  note.textContent = '';

  const index = +answer.dataset.index;

  // Google Форма не настроена — тестовый режим
  if (!GOOGLE_URL || !G.nameEntry || !G.answerEntry){
    console.log('RSVP (Google Форма не подключена):', { name, answer: answer.value });
    showThanks(index);
    return;
  }

  const payload = { [G.nameEntry]: name, [G.answerEntry]: answer.value };
  const label = submitBtn.textContent;
  submitBtn.textContent = L.rsvp.sending;
  try {
    // Google не отдаёт CORS-заголовки, поэтому ответ непрозрачный:
    // отсутствие ошибки означает, что запрос ушёл.
    await fetch(GOOGLE_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(payload).toString()
    });
    showThanks(index);
  } catch (err) {
    try {
      submitViaIframe(payload);
      showThanks(index);
    } catch (err2) {
      submitBtn.textContent = label;
      note.textContent = L.rsvp.errSend;
    }
  }
});
</script>
